<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Poem Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="panel">
      <div class="eyebrow">macOS-friendly setup</div>
      <h1>Poem Generator</h1>
      <p class="intro">Enter a theme, choose the tone, and send it to your n8n test webhook.</p>

      <form id="keywordForm" class="poem-form">
        <label for="keyword">Keyword</label>
        <input type="text" id="keyword" placeholder="e.g. sunset over Prague" required>

        <label for="poemStyle">Poem style</label>
        <select id="poemStyle" required>
          <option value="haiku">Haiku</option>
          <option value="sonnet">Sonnet</option>
          <option value="freeverse">Free Verse</option>
        </select>

        <label for="poemLength">Length</label>
        <select id="poemLength" required>
          <option value="short">Short</option>
          <option value="medium">Medium</option>
          <option value="long">Long</option>
        </select>

        <label for="poemMood">Mood</label>
        <select id="poemMood" required>
          <option value="cheerful">Cheerful</option>
          <option value="melancholic">Melancholic</option>
          <option value="whimsical">Whimsical</option>
        </select>

        <button id="submitButton" type="submit">Generate Poem</button>
        <p id="statusMessage" class="status-message" aria-live="polite"></p>
      </form>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
